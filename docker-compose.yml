services:
  klaps-backend:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-klaps-backend}
    restart: always
    expose:
      - "${PORT}"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${PORT}/api/v2/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # The container sits on two networks now; without this hint Traefik
      # may pick the database network IP, which it cannot reach (504s).
      - "traefik.docker.network=traefik_public"
      # HTTPS
      - "traefik.http.routers.${CONTAINER_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${CONTAINER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${CONTAINER_NAME}.tls.certresolver=leresolver"
      # HTTP redirect
      - "traefik.http.routers.${CONTAINER_NAME}-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${CONTAINER_NAME}-web.entrypoints=web"
      - "traefik.http.routers.${CONTAINER_NAME}-web.middlewares=redirect-to-https"
      # Service port
      - "traefik.http.services.${CONTAINER_NAME}.loadbalancer.server.port=${PORT}"
      # Compression (zstd/brotli/gzip): API responses leave Nest plain,
      # so Traefik picks the best encoding the client accepts.
      - "traefik.http.middlewares.${CONTAINER_NAME}-compress.compress=true"
      - "traefik.http.routers.${CONTAINER_NAME}.middlewares=${CONTAINER_NAME}-compress"
    networks:
      - traefik_public
      - db

networks:
  traefik_public:
    external: true
  # Internal network shared with the Postgres container. The database
  # publishes no public port, so this is the only path to it.
  # DEPLOY_ENV (prod/dev) is written to .env by the deploy workflow.
  db:
    external: true
    name: klaps-db-${DEPLOY_ENV}
